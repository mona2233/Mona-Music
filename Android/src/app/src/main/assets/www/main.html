<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Mona Music Android</title>
    <style>
      @font-face {
        font-family: "Hey November";
        src: url("./fonts/Hey-November-2.otf") format("opentype");
      }
      @font-face {
        font-family: "Source Han Sans SC";
        src: url("./fonts/SourceHanSansSC-Regular-2.otf") format("opentype");
      }

      :root {
        --bg-a: #0d1018;
        --bg-b: #161d2d;
        --card: rgba(255, 255, 255, 0.09);
        --line: rgba(255, 255, 255, 0.14);
        --text-main: #f7f8fc;
        --text-soft: rgba(247, 248, 252, 0.68);
        --accent: #ff5c88;
        --accent-2: #ff2e69;
        --safe-top: max(env(safe-area-inset-top), 24px);
        --safe-bottom: max(env(safe-area-inset-bottom), 22px);
        --ctrl-size: clamp(42px, 11vw, 52px);
      }

      * {
        box-sizing: border-box;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100dvh;
        min-height: 100vh;
        overflow: hidden;
        background: #07090f;
        font-family: "Source Han Sans SC", sans-serif;
        color: var(--text-main);
      }

      body {
        overflow: hidden;
      }

      .viewport {
        width: 100%;
        height: 100dvh;
        min-height: 100vh;
        overflow: hidden;
      }

      .phone {
        width: 100%;
        height: 100%;
        max-width: 820px;
        margin: 0 auto;
        border-radius: 0;
        overflow: hidden;
        position: relative;
        background:
          radial-gradient(circle at 88% 10%, rgba(255, 46, 105, 0.28), transparent 28%),
          radial-gradient(circle at 12% 78%, rgba(57, 113, 255, 0.28), transparent 35%),
          linear-gradient(165deg, var(--bg-b), var(--bg-a));
        box-shadow: none;
      }

      .app {
        width: 100%;
        height: 100%;
        padding: var(--safe-top) clamp(12px, 4.8vw, 26px) var(--safe-bottom);
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto auto;
        gap: clamp(6px, 2vw, 12px);
      }

      .top {
        display: flex;
        align-items: center;
        justify-content: flex-start;
      }

      .brand {
        font-family: "Hey November", sans-serif;
        font-size: clamp(30px, 8.8vw, 58px);
        line-height: 1;
      }

      .meta h1 {
        margin: 0;
        font-size: clamp(24px, 8.2vw, 42px);
        line-height: 1.14;
        word-break: break-word;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .meta p {
        margin: 8px 0 0;
        font-size: clamp(16px, 5.1vw, 22px);
        color: var(--text-soft);
      }

      .meta-row {
        display: grid;
        grid-template-columns: clamp(84px, 29vw, 112px) minmax(0, 1fr);
        gap: clamp(10px, 3vw, 14px);
        align-items: center;
      }

      .cover-thumb {
        width: clamp(84px, 29vw, 112px);
        height: clamp(84px, 29vw, 112px);
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .cover-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .cover-fallback {
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.02)),
          linear-gradient(145deg, #2a2f42, #161a26);
      }

      .lyrics-card {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(7, 10, 18, 0.45);
        padding: 8px clamp(10px, 4vw, 18px);
        min-height: 0;
        overflow: hidden;
      }

      .lyrics {
        height: 100%;
        overflow-y: auto;
        padding: 44% 6px;
        mask-image: linear-gradient(to bottom, transparent 0%, black 9%, black 91%, transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 9%, black 91%, transparent 100%);
        scrollbar-width: none;
      }

      .lyrics::-webkit-scrollbar { display: none; }

      .line {
        margin: clamp(10px, 2.6vw, 16px) 0;
        font-size: clamp(16px, 5vw, 24px);
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.3);
        transition: 0.2s ease;
      }

      .line.active {
        color: rgba(255, 255, 255, 0.98);
        transform: scale(1.02);
        transform-origin: left center;
      }

      .progress-wrap {
        display: grid;
        gap: 8px;
      }

      .progress {
        width: 100%;
        appearance: none;
        height: 8px;
        border-radius: 999px;
        background:
          linear-gradient(90deg, var(--accent), var(--accent) var(--p, 0%), rgba(255, 255, 255, 0.18) var(--p, 0%));
      }

      .time {
        display: flex;
        justify-content: space-between;
        font-size: clamp(14px, 4.2vw, 18px);
        color: var(--text-soft);
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        align-items: center;
        gap: clamp(4px, 1.6vw, 8px);
      }

      .ctrl-btn {
        width: min(100%, var(--ctrl-size));
        max-width: none;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.1);
        display: grid;
        place-items: center;
        padding: 0;
        margin: 0;
        justify-self: center;
      }

      .ctrl-btn img {
        width: clamp(16px, 4.8vw, 21px);
        height: clamp(16px, 4.8vw, 21px);
        object-fit: contain;
        filter: brightness(0) invert(1);
      }

      .ctrl-btn .flip {
        transform: scaleX(-1);
      }

      .ctrl-btn.main {
        background: linear-gradient(145deg, var(--accent), var(--accent-2));
        border-color: transparent;
      }

      .ctrl-btn.main img {
        width: clamp(16px, 5vw, 22px);
        height: clamp(16px, 5vw, 22px);
      }

      .sheet-mask {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        opacity: 0;
        pointer-events: none;
        transition: 0.24s ease;
      }

      .sheet {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 74%;
        border-radius: 24px 24px 0 0;
        background: #1a2234;
        border-top: 1px solid var(--line);
        transform: translateY(102%);
        transition: 0.28s cubic-bezier(0.2, 0, 0, 1);
        padding: 16px 16px 24px;
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
        isolation: isolate;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }

      .sheet::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(165deg, #1f2638, #161d2c);
        opacity: 1;
        z-index: 0;
        pointer-events: none;
      }

      .sheet.open { transform: translateY(0); }
      .sheet-mask.open { opacity: 1; pointer-events: auto; }

      .sheet-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        position: relative;
        z-index: 1;
      }

      .sheet-head h3 { margin: 0; font-size: 24px; }

      .sheet-close {
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 22px;
      }

      .list {
        overflow: auto;
        position: relative;
        z-index: 1;
        background: #1b2335;
        border-radius: 14px;
        padding: 8px;
        overscroll-behavior: contain;
      }

      .item {
        width: 100%;
        text-align: left;
        border: 1px solid transparent;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        padding: 10px;
        margin-bottom: 8px;
      }

      .item.active {
        border-color: rgba(255, 255, 255, 0.26);
        background: rgba(255, 255, 255, 0.12);
      }

      .item .t { display: block; font-size: 16px; }
      .item .a { display: block; font-size: 12px; color: rgba(255, 255, 255, 0.72); }

      .mode-tip {
        position: absolute;
        left: 50%;
        bottom: calc(var(--safe-bottom) + 88px);
        transform: translateX(-50%);
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.18);
        font-size: 13px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.16s ease;
        z-index: 5;
      }
      .mode-tip.show { opacity: 1; }

      @media (max-width: 360px) {
        .app {
          padding-left: 10px;
          padding-right: 10px;
          gap: 6px;
        }
        .meta-row {
          grid-template-columns: 80px minmax(0, 1fr);
          gap: 8px;
        }
        .cover-thumb {
          width: 80px;
          height: 80px;
        }
      }

      @media (max-height: 740px) {
        .app {
          gap: 4px;
        }
        .lyrics-card {
          border-radius: 18px;
          padding-top: 6px;
          padding-bottom: 6px;
        }
        .lyrics {
          padding-top: 36%;
          padding-bottom: 36%;
        }
      }

      @media (min-width: 768px) {
        .phone {
          border-left: 1px solid rgba(255, 255, 255, 0.08);
          border-right: 1px solid rgba(255, 255, 255, 0.08);
        }
        .app {
          padding-left: 24px;
          padding-right: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="viewport">
    <div class="phone">
      <main class="app">
        <header class="top">
          <div class="brand">Mona Music</div>
        </header>

        <section class="meta">
          <div class="meta-row">
            <div class="cover-thumb">
              <img id="cover-img" src="" alt="" style="display:none;" />
              <div id="cover-fallback" class="cover-fallback"></div>
            </div>
            <div>
              <h1 id="song-title">暂无歌曲</h1>
              <p id="song-artist">未知歌手</p>
            </div>
          </div>
        </section>

        <section class="lyrics-card">
          <div id="lyrics-wrap" class="lyrics">
            <p class="line active">暂无歌词</p>
          </div>
        </section>

        <section class="progress-wrap">
          <input id="progress" class="progress" type="range" min="0" max="1000" value="286" />
          <div class="time">
            <span id="current">01:26</span>
            <span>04:58</span>
          </div>
        </section>

        <section class="controls">
          <button id="queue-btn" class="ctrl-btn" title="播放列表" onclick="if(!window.__mainReady){(function(){var s=document.getElementById('sheet');var m=document.getElementById('sheet-mask');if(s)s.classList.add('open');if(m)m.classList.add('open');if(window.__openQueue)window.__openQueue();})();}">
            <img src="./icons/list.svg" alt="" />
          </button>
          <button id="prev" class="ctrl-btn" title="上一首" onclick="if(!window.__mainReady){(function(){var b=window.AndroidBridge;if(b&&b.prevTrack)b.prevTrack();})();}">
            <img src="./icons/next.svg" class="flip" alt="" />
          </button>
          <button id="play" class="ctrl-btn main" title="播放/暂停" onclick="if(!window.__mainReady){(function(){var b=window.AndroidBridge;if(b&&b.togglePlayPause)b.togglePlayPause();})();}">
            <img id="play-icon" src="./icons/pause.svg" alt="" />
          </button>
          <button id="next" class="ctrl-btn" title="下一首" onclick="if(!window.__mainReady){(function(){var b=window.AndroidBridge;if(b&&b.nextTrack)b.nextTrack();})();}">
            <img src="./icons/next.svg" alt="" />
          </button>
          <button id="mode" class="ctrl-btn" title="随机播放" onclick="if(!window.__mainReady){(function(){var b=window.AndroidBridge;if(!b||!b.getPlayMode||!b.setPlayMode)return;try{var m=Number(b.getPlayMode());if(!isFinite(m))m=2;m=(m+1)%3;b.setPlayMode(m);}catch(_){}})();}">
            <img id="mode-icon" src="./icons/shuffle.svg" alt="" />
          </button>
          <button id="settings-btn" class="ctrl-btn" title="设置" onclick="window.location.replace('./settings.html')">
            <img src="./icons/settings.svg" alt="" />
          </button>
        </section>
      </main>

      <div id="sheet-mask" class="sheet-mask" onclick="(function(){var s=document.getElementById('sheet');var m=document.getElementById('sheet-mask');if(s)s.classList.remove('open');if(m)m.classList.remove('open');})()"></div>
      <section id="sheet" class="sheet">
        <div class="sheet-head">
          <h3>当前歌单</h3>
          <button id="sheet-close" class="sheet-close" onclick="(function(){var s=document.getElementById('sheet');var m=document.getElementById('sheet-mask');if(s)s.classList.remove('open');if(m)m.classList.remove('open');})()">×</button>
        </div>
        <div id="list" class="list"></div>
      </section>
      <div id="mode-tip" class="mode-tip">模式</div>
    </div>
    </div>

    <script>
      function cleanSongTitle(rawTitle, rawArtist) {
        const title = String(rawTitle || "").trim();
        const artist = String(rawArtist || "").trim();
        if (!title) return "未知歌曲";
        let out = title;
        if (artist) {
          const escapedArtist = artist.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const patterns = [
            new RegExp(`^${escapedArtist}\\s*[-–—:：|]\\s*`, "i"),
            new RegExp(`^${escapedArtist}\\s+`, "i"),
          ];
          for (const p of patterns) out = out.replace(p, "").trim();
        }
        // 无论歌手信息是否可用，只显示分隔符后半段，避免“歌手 - 歌名”同显
        out = out.replace(/^.+?\s*[-–—:：|]\s*/, "").trim();
        return out || title;
      }

      // 兼容兜底：即使后续脚本异常，也先把歌单渲染出来
      (function () {
        try {
          var bridge = window.AndroidBridge;
          var titleEl = document.getElementById("song-title");
          var artistEl = document.getElementById("song-artist");
          var listEl = document.getElementById("list");
          var queueBtn = document.getElementById("queue-btn");
          var closeBtn = document.getElementById("sheet-close");
          var mask = document.getElementById("sheet-mask");
          var sheet = document.getElementById("sheet");

          function openSheetCompat() {
            if (sheet) sheet.classList.add("open");
            if (mask) mask.classList.add("open");
          }
          function closeSheetCompat() {
            if (sheet) sheet.classList.remove("open");
            if (mask) mask.classList.remove("open");
          }
          if (queueBtn) queueBtn.addEventListener("click", openSheetCompat);
          if (closeBtn) closeBtn.addEventListener("click", closeSheetCompat);
          if (mask) mask.addEventListener("click", closeSheetCompat);

          if (!bridge || typeof bridge.getSongsJson !== "function") return;
          var raw = bridge.getSongsJson() || "[]";
          var arr = JSON.parse(raw);
          var initIndex = 0;
          try {
            if (bridge.getPlaybackStateJson) {
              var st = JSON.parse(bridge.getPlaybackStateJson() || "{}");
              var idx = Number(st.index);
              if (isFinite(idx) && idx >= 0 && idx < arr.length) initIndex = idx;
            }
          } catch (_) {}
          if (!arr || !arr.length) {
            if (titleEl) titleEl.textContent = "暂无歌曲";
            if (artistEl) artistEl.textContent = "请先在设置中添加并扫描曲库";
            if (listEl) {
              listEl.innerHTML = "";
              var empty = document.createElement("div");
              empty.className = "item";
              empty.textContent = "曲库为空，请先在设置中添加并扫描。";
              listEl.appendChild(empty);
            }
            return;
          }

          var first = arr[initIndex] || arr[0];
          if (titleEl) titleEl.textContent = cleanSongTitle(first.title || "未知歌曲", first.artist || "");
          if (artistEl) artistEl.textContent = first.artist || "未知歌手";
          if (listEl) {
            listEl.innerHTML = "";
            for (var i = 0; i < arr.length; i += 1) {
              var it = arr[i] || {};
              var btn = document.createElement("button");
              btn.className = "item" + (i === initIndex ? " active" : "");
              btn.innerHTML = "<span class='t'>" + (it.title || "未知歌曲") + "</span><span class='a'>" + (it.artist || "未知歌手") + "</span>";
              (function (idx, title, artist) {
                btn.addEventListener("click", function () {
                  try {
                    if (bridge && bridge.playAtIndex) bridge.playAtIndex(idx);
                    if (titleEl) titleEl.textContent = cleanSongTitle(title || "未知歌曲", artist || "");
                    if (artistEl) artistEl.textContent = artist || "未知歌手";
                    closeSheetCompat();
                  } catch (_) {}
                });
              })(i, it.title, it.artist);
              listEl.appendChild(btn);
            }
          }
        } catch (_) {
          // ignore fallback errors
        }
      })();
    </script>

    <script>
      const bridge = window.AndroidBridge;
      const fallbackTracks = [];
      let tracks = [];
      let index = 0;
      let playing = true;
      let mode = 2;
      const titleEl = document.getElementById("song-title");
      const artistEl = document.getElementById("song-artist");
      const coverImg = document.getElementById("cover-img");
      const coverFallback = document.getElementById("cover-fallback");
      const playIcon = document.getElementById("play-icon");
      const prevBtn = document.getElementById("prev");
      const nextBtn = document.getElementById("next");
      const modeBtn = document.getElementById("mode");
      const modeIcon = document.getElementById("mode-icon");
      const settingsBtn = document.getElementById("settings-btn");
      const listEl = document.getElementById("list");
      const sheet = document.getElementById("sheet");
      const mask = document.getElementById("sheet-mask");
      const queueBtn = document.getElementById("queue-btn");
      const closeBtn = document.getElementById("sheet-close");
      const playBtn = document.getElementById("play");
      const progress = document.getElementById("progress");
      const current = document.getElementById("current");
      const total = document.querySelector(".time span:last-child");
      const lyricsWrap = document.getElementById("lyrics-wrap");
      const modeTip = document.getElementById("mode-tip");
      let isSheetOpen = false;

      let shuffleRoundPlayed = new Set();
      let shuffleRoundQueue = [];
      let lyricLines = [];
      let lyricNodes = [];
      let activeLyricIndex = -1;
      let hasTimedLyrics = false;
      let currentDurationMs = 0;
      let modeTipTimer = null;
      let nativeResyncTimer = null;

      function loadTracksFromNative() {
        try {
          if (!bridge || typeof bridge.getSongsJson !== "function") {
            tracks = fallbackTracks;
            return;
          }
          const raw = bridge.getSongsJson() || "[]";
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length > 0) {
            tracks = parsed.map((item) => ({
              id: item.id,
              title: item.title || "未知歌曲",
              artist: item.artist || "未知歌手",
              durationMs: Number(item.durationMs || 0),
              uri: item.uri || "",
            }));
          } else {
            tracks = fallbackTracks;
          }
        } catch {
          tracks = fallbackTracks;
        }
      }

      function forceRefreshLibraryNative() {
        try {
          if (bridge && typeof bridge.refreshLibraryNow === "function") {
            bridge.refreshLibraryNow();
          }
        } catch {}
      }

      function getNativeCurrentIndex() {
        try {
          if (!bridge || typeof bridge.getPlaybackStateJson !== "function") return -1;
          const state = JSON.parse(bridge.getPlaybackStateJson() || "{}");
          const i = Number(state.index);
          if (Number.isFinite(i)) return i;
        } catch {}
        return -1;
      }

      function reloadLibraryAndRender() {
        const prevCount = tracks.length;
        loadTracksFromNative();
        const nativeIndex = getNativeCurrentIndex();
        if (!tracks.length) {
          titleEl.textContent = "暂无歌曲";
          artistEl.textContent = "请先在设置中添加并扫描曲库";
        }
        if (!prevCount && tracks.length) {
          index = nativeIndex >= 0 && nativeIndex < tracks.length ? nativeIndex : 0;
        } else if (index >= tracks.length) {
          index = Math.max(0, tracks.length - 1);
        } else if (nativeIndex >= 0 && nativeIndex < tracks.length) {
          index = nativeIndex;
        }
        renderTrack();
      }

      function syncIndexFromNativeState(state) {
        const nativeIndex = Number(state && state.index);
        if (!Number.isFinite(nativeIndex) || nativeIndex < 0) return false;
        if (!tracks.length || nativeIndex >= tracks.length) {
          loadTracksFromNative();
        }
        if (!tracks.length || nativeIndex >= tracks.length) return false;
        if (index !== nativeIndex) {
          index = nativeIndex;
          renderTrack();
        }
        return true;
      }

      function scheduleNativeResync(delayMs = 220) {
        if (nativeResyncTimer) clearTimeout(nativeResyncTimer);
        nativeResyncTimer = setTimeout(() => {
          nativeResyncTimer = null;
          reloadLibraryAndRender();
          pollPlaybackState();
        }, delayMs);
      }

      function loadPlayMode() {
        try {
          if (!bridge || typeof bridge.getPlayMode !== "function") return;
          const value = Number(bridge.getPlayMode());
          if (Number.isFinite(value) && value >= 0 && value <= 2) {
            mode = value;
          }
        } catch {
          // ignore
        }
      }

      function savePlayMode() {
        try {
          if (!bridge || typeof bridge.setPlayMode !== "function") return;
          bridge.setPlayMode(mode);
        } catch {
          // ignore
        }
      }

      function renderTrack() {
        const t = tracks[index] || { title: "暂无歌曲", artist: "请先添加音乐" };
        titleEl.textContent = cleanSongTitle(t.title, t.artist);
        const artistText = t.artist === "本地目录" || t.artist === "WebDAV" ? "" : t.artist;
        artistEl.textContent = artistText || "未知歌手";
        total.textContent = formatMs(t.durationMs || 0);
        loadTrackMeta(index);
        renderList();
      }

      function parseLrc(text) {
        const out = [];
        const lines = String(text || "").split(/\r?\n/);
        for (const line of lines) {
          const reg = /\[(\d{1,3}):(\d{1,2})(?:[.:](\d{1,3}))?]/g;
          const content = line.replace(reg, "").trim();
          if (!content) continue;
          let matched = false;
          let m;
          while ((m = reg.exec(line)) !== null) {
            matched = true;
            const mm = Number(m[1]);
            const ss = Number(m[2]);
            const frac = String(m[3] || "0").padEnd(3, "0");
            const ms = Number(frac);
            out.push({ time: mm * 60 + ss + ms / 1000, text: content, timed: true });
          }
          if (!matched) out.push({ time: 0, text: content, timed: false });
        }
        out.sort((a, b) => a.time - b.time);
        return out;
      }

      function parsePlainLyrics(text) {
        return String(text || "")
          .split(/\r?\n/)
          .map((x) => x.trim())
          .filter(Boolean)
          .map((x) => ({ time: 0, text: x, timed: false }));
      }

      function renderLyrics() {
        lyricsWrap.innerHTML = "";
        lyricNodes = [];
        activeLyricIndex = -1;
        if (!lyricLines.length) {
          const p = document.createElement("p");
          p.className = "line active";
          p.textContent = "暂无歌词";
          lyricsWrap.appendChild(p);
          return;
        }
        for (const line of lyricLines) {
          const p = document.createElement("p");
          p.className = "line";
          p.textContent = line.text;
          lyricsWrap.appendChild(p);
          lyricNodes.push(p);
        }
      }

      function setActiveLyric(i, smooth = false) {
        if (i < 0 || i >= lyricNodes.length || i === activeLyricIndex) return;
        if (activeLyricIndex >= 0) lyricNodes[activeLyricIndex].classList.remove("active");
        activeLyricIndex = i;
        const node = lyricNodes[i];
        node.classList.add("active");
        const wrapRect = lyricsWrap.getBoundingClientRect();
        const nodeRect = node.getBoundingClientRect();
        const nodeCenter = nodeRect.top + nodeRect.height / 2;
        const wrapCenter = wrapRect.top + wrapRect.height / 2;
        const delta = nodeCenter - wrapCenter;
        const maxScroll = Math.max(0, lyricsWrap.scrollHeight - lyricsWrap.clientHeight);
        const target = Math.max(0, Math.min(maxScroll, lyricsWrap.scrollTop + delta));
        lyricsWrap.scrollTo({ top: target, behavior: smooth ? "smooth" : "auto" });
      }

      function updateLyricsByTime(seconds) {
        if (isSheetOpen) return;
        if (!hasTimedLyrics || !lyricLines.length) return;
        let idx = -1;
        for (let i = 0; i < lyricLines.length; i += 1) {
          if (lyricLines[i].time <= seconds + 0.08) idx = i;
          else break;
        }
        if (idx >= 0) setActiveLyric(idx, false);
      }

      function loadTrackMeta(trackIndex) {
        try {
          if (!bridge || typeof bridge.getTrackMetaJson !== "function") {
            coverImg.style.display = "none";
            coverFallback.style.display = "block";
            lyricLines = [];
            hasTimedLyrics = false;
            renderLyrics();
            return;
          }
          const raw = bridge.getTrackMetaJson(trackIndex);
          const meta = JSON.parse(raw || "{}");
          applyTrackMeta(trackIndex, meta, true);
        } catch {
          coverImg.style.display = "none";
          coverFallback.style.display = "block";
          lyricLines = [];
          hasTimedLyrics = false;
          renderLyrics();
        }
      }

      function applyTrackMeta(trackIndex, meta, resetLyricPos) {
        const metaArtist = String(meta.artist || "").trim();
        if (metaArtist) {
          artistEl.textContent = metaArtist;
        }
        const metaTitle = String(meta.title || "").trim();
        if (metaTitle) {
          titleEl.textContent = cleanSongTitle(metaTitle, metaArtist || tracks[trackIndex]?.artist || "");
        }
        const coverDataUrl = String(meta.coverDataUrl || "");
        if (coverDataUrl) {
          coverImg.src = coverDataUrl;
          coverImg.style.display = "block";
          coverFallback.style.display = "none";
        } else {
          coverImg.removeAttribute("src");
          coverImg.style.display = "none";
          coverFallback.style.display = "block";
        }

        const lyricsText = String(meta.lyrics || "").trim();
        lyricLines = parseLrc(lyricsText);
        if (!lyricLines.length && lyricsText) {
          lyricLines = parsePlainLyrics(lyricsText);
        }
        hasTimedLyrics = lyricLines.some((x) => x.timed);
        renderLyrics();
        if (resetLyricPos && lyricLines.length > 0) {
          setActiveLyric(0, true);
        }
      }

      function renderList() {
        listEl.innerHTML = "";
        if (!tracks.length) {
          const empty = document.createElement("div");
          empty.className = "item";
          empty.textContent = "曲库为空，请先在设置中添加并扫描。";
          listEl.appendChild(empty);
          return;
        }
        tracks.forEach((t, i) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `item${i === index ? " active" : ""}`;
          btn.innerHTML = `<span class="t">${t.title}</span><span class="a">${t.artist}</span>`;
          btn.addEventListener("click", () => {
            index = i;
            renderTrack();
            try {
              if (bridge && typeof bridge.playAtIndex === "function") {
                bridge.playAtIndex(i);
              }
            } catch {}
            closeSheet();
          });
          listEl.appendChild(btn);
        });
      }

      function focusCurrentSongInList() {
        const active = listEl.querySelector(".item.active");
        if (!active) return;
        const activeTop = active.offsetTop;
        const activeHeight = active.offsetHeight;
        const viewport = listEl.clientHeight;
        const targetTop = Math.max(0, activeTop - (viewport - activeHeight) / 2);
        listEl.scrollTop = targetTop;
      }

      function togglePlay() {
        try {
          if (bridge && typeof bridge.togglePlayPause === "function") {
            bridge.togglePlayPause();
            return;
          }
        } catch {}
        playing = !playing;
        playIcon.src = playing ? "./icons/pause.svg" : "./icons/play.svg";
      }

      function setMode(showTip = false) {
        const icons = ["./icons/sequence.svg", "./icons/loop.svg", "./icons/shuffle.svg"];
        const titles = ["列表循环", "单曲循环", "随机播放"];
        modeIcon.src = icons[mode];
        modeBtn.title = titles[mode];
        if (showTip && modeTip) {
          modeTip.textContent = `模式: ${titles[mode]}`;
          modeTip.classList.add("show");
          if (modeTipTimer) clearTimeout(modeTipTimer);
          modeTipTimer = setTimeout(() => modeTip.classList.remove("show"), 600);
        }
      }

      function formatMs(ms) {
        const safe = Math.max(0, Number(ms || 0));
        const secTotal = Math.floor(safe / 1000);
        const m = String(Math.floor(secTotal / 60)).padStart(2, "0");
        const s = String(secTotal % 60).padStart(2, "0");
        return `${m}:${s}`;
      }

      function shuffleInPlace(arr) {
        for (let i = arr.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }

      function resetShuffleRound(markCurrent = true) {
        shuffleRoundPlayed = new Set();
        if (markCurrent && index >= 0 && index < tracks.length) {
          shuffleRoundPlayed.add(index);
        }
        const pool = [];
        for (let i = 0; i < tracks.length; i += 1) {
          if (!shuffleRoundPlayed.has(i)) pool.push(i);
        }
        shuffleInPlace(pool);
        shuffleRoundQueue = pool;
      }

      function takeNextShuffleIndex() {
        if (tracks.length <= 1) return 0;
        shuffleRoundPlayed.add(index);
        shuffleRoundQueue = shuffleRoundQueue.filter((i) => i !== index);
        if (shuffleRoundQueue.length === 0) {
          resetShuffleRound(true);
        }
        return shuffleRoundQueue.length > 0 ? shuffleRoundQueue.shift() : (index + 1) % tracks.length;
      }

      function playAt(i) {
        if (!tracks.length) return;
        index = Math.max(0, Math.min(tracks.length - 1, i));
        renderTrack();
        try {
          if (bridge && typeof bridge.playAtIndex === "function") {
            bridge.playAtIndex(index);
          }
        } catch {}
      }

      function handleTrackEnded() {
        // 结束后的下一首逻辑由原生层处理
      }

      function pollPlaybackState() {
        try {
          if (!bridge || typeof bridge.getPlaybackStateJson !== "function") return;
          const state = JSON.parse(bridge.getPlaybackStateJson() || "{}");
          const synced = syncIndexFromNativeState(state);
          if (!synced && state && state.isPlaying) {
            scheduleNativeResync(120);
          }
          if (Number.isFinite(state.positionMs) && Number.isFinite(state.durationMs) && state.durationMs > 0) {
            currentDurationMs = Number(state.durationMs) || 0;
            const ratio = Math.max(0, Math.min(1, state.positionMs / state.durationMs));
            progress.value = Math.round(ratio * 1000);
            progress.style.setProperty("--p", `${ratio * 100}%`);
            current.textContent = formatMs(state.positionMs);
            total.textContent = formatMs(state.durationMs);
            updateLyricsByTime(state.positionMs / 1000);
          }
          if (typeof state.isPlaying === "boolean") {
            playing = state.isPlaying;
            playIcon.src = playing ? "./icons/pause.svg" : "./icons/play.svg";
          }
        } catch {}
      }

      window.onNativePlaybackState = (state) => {
        if (!state) return;
        try {
          const synced = syncIndexFromNativeState(state);
          if (!synced && Number.isFinite(Number(state.index)) && Number(state.index) >= 0) {
            scheduleNativeResync(120);
          }
        } catch {}
      };

      window.onNativeTrackMetaReady = (metaIndex, meta) => {
        try {
          if (!Number.isFinite(metaIndex)) return;
          if (metaIndex !== index) return;
          applyTrackMeta(index, meta || {}, false);
        } catch {}
      };

      function openSheet() {
        renderList();
        sheet.classList.add("open");
        mask.classList.add("open");
        isSheetOpen = true;
        try {
          if (bridge && typeof bridge.setMainSheetOpen === "function") bridge.setMainSheetOpen(true);
        } catch (_) {}
        setTimeout(() => {
          if (isSheetOpen) focusCurrentSongInList();
        }, 300);
      }
      window.__openQueue = openSheet;

      function closeSheet() {
        sheet.classList.remove("open");
        mask.classList.remove("open");
        isSheetOpen = false;
        try {
          if (bridge && typeof bridge.setMainSheetOpen === "function") bridge.setMainSheetOpen(false);
        } catch (_) {}
      }
      window.closeSheet = closeSheet;

      queueBtn.addEventListener("click", openSheet);
      closeBtn.addEventListener("click", closeSheet);
      mask.addEventListener("click", closeSheet);

      prevBtn.addEventListener("click", () => {
        try {
          if (bridge && typeof bridge.prevTrack === "function") {
            bridge.prevTrack();
            scheduleNativeResync();
            return;
          }
        } catch {}
        playAt((index - 1 + tracks.length) % tracks.length);
      });

      nextBtn.addEventListener("click", () => {
        try {
          if (bridge && typeof bridge.nextTrack === "function") {
            bridge.nextTrack();
            scheduleNativeResync();
            return;
          }
        } catch {}
        playAt((index + 1) % tracks.length);
      });

      playBtn.addEventListener("click", togglePlay);

      modeBtn.addEventListener("click", () => {
        mode = (mode + 1) % 3;
        setMode(true);
        savePlayMode();
        if (mode === 2) {
          resetShuffleRound(true);
        }
      });

      settingsBtn.addEventListener("click", () => {
        window.location.replace("./settings.html");
      });

      document.addEventListener("contextmenu", (e) => e.preventDefault());
      document.addEventListener("selectstart", (e) => e.preventDefault());

      (function bindSwipeCloseCurrent() {
        let sx = 0;
        let sy = 0;
        let startAt = 0;
        document.addEventListener("touchstart", (e) => {
          if (!e.touches || !e.touches.length) return;
          sx = e.touches[0].clientX;
          sy = e.touches[0].clientY;
          startAt = Date.now();
        }, { passive: true });
        document.addEventListener("touchend", (e) => {
          if (!e.changedTouches || !e.changedTouches.length) return;
          const ex = e.changedTouches[0].clientX;
          const ey = e.changedTouches[0].clientY;
          const dx = ex - sx;
          const dy = Math.abs(ey - sy);
          const dt = Date.now() - startAt;
          if (dx < -70 && dy < 48 && dt < 450) {
            if (isSheetOpen || sheet.classList.contains("open")) {
              closeSheet();
              return;
            }
            // 仅主页左边缘手势触发退出确认，避免与页面内滑动冲突
            if (sx > 80) return;
            try {
              if (bridge && typeof bridge.requestExitConfirm === "function") {
                bridge.requestExitConfirm();
                return;
              }
            } catch (_) {}
            // 未接入原生桥时不执行 history.back，避免误退到桌面
          }
        }, { passive: true });
      })();

      progress.style.setProperty("--p", "0%");
      progress.addEventListener("change", () => {
        try {
          if (!bridge || typeof bridge.seekTo !== "function") return;
          const t = tracks[index];
          const durationMs = Math.max(Number(currentDurationMs || 0), Number((t && t.durationMs) || 0));
          if (durationMs <= 0) return;
          const ratio = Number(progress.value) / 1000;
          bridge.seekTo(Math.floor(durationMs * ratio));
        } catch {}
      });

      reloadLibraryAndRender();
      loadPlayMode();
      if (mode === 2) resetShuffleRound(false);
      setMode();
      setInterval(pollPlaybackState, 500);
      window.__mainReady = true;
    </script>
  </body>
</html>
